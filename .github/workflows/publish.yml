name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - py313-pytest84
          - py313-pytest9
          - py314-pytest84
          - py314-pytest9
        include:
          - profile: py313-pytest84
            python-version: "3.13"
          - profile: py313-pytest9
            python-version: "3.13"
          - profile: py314-pytest84
            python-version: "3.14"
          - profile: py314-pytest9
            python-version: "3.14"

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run compatibility profile
        run: python scripts/run_compat.py ${{ matrix.profile }} --recreate

  build:
    needs: compat
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata rendering
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
